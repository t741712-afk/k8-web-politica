server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — todo lo que no sea /api/ sirve el index.html
    location / {
        try_files $uri /index.html;
    }

    # Proxy de las llamadas API al backend FastAPI
    location /asistente/api/ {
        proxy_pass http://ppf-ai-backend:8007/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 50m;
    }
}
