---
apiVersion: v1
kind: Namespace
metadata:
  name: ppf

---
# ── PostgreSQL ────────────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: ppf
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: ppf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: ppf
            - name: POSTGRES_USER
              value: ppf
            - name: POSTGRES_PASSWORD
              value: ppf123
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ppf
spec:
  selector:
    app: postgres
  ports:
    - port: 5432

---
# ── Backend ───────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppf-backend
  namespace: ppf
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ppf-backend
  template:
    metadata:
      labels:
        app: ppf-backend
    spec:
      containers:
        - name: backend
          image: ppf-backend:latest
          imagePullPolicy: Never
          env:
            - name: DB_HOST
              value: postgres
            - name: DB_NAME
              value: ppf
            - name: DB_USER
              value: ppf
            - name: DB_PASSWORD
              value: ppf123
          ports:
            - containerPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: ppf-backend
  namespace: ppf
spec:
  selector:
    app: ppf-backend
  ports:
    - port: 3000

---
# ── Frontend ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ppf-frontend
  namespace: ppf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ppf-frontend
  template:
    metadata:
      labels:
        app: ppf-frontend
    spec:
      containers:
        - name: frontend
          image: ppf-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: ppf-frontend
  namespace: ppf
spec:
  type: NodePort
  selector:
    app: ppf-frontend
  ports:
    - port: 80
      nodePort: 30080
